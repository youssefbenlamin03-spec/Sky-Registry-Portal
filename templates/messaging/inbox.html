{% extends "layout.html" %}

{% block content %}

<!-- Main container using full width with horizontal padding -->
<div class="container-fluid px-4">

    <!-- Header row with inbox title and new message button -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 style="color: #0172B0; font-weight: bold;">💬 Inbox</h2>

        <!-- Button to navigate to the new message form -->
        <a href="/messages/new/" class="btn text-white" style="background-color: #0172B0;">
            ✉️ New Message
        </a>
    </div>

    <!-- Chat thread container -->
    <div class="card shadow-sm w-100">
        <div class="card-header text-white fw-bold" style="background-color: #0172B0;">
            Messages
        </div>

        <!-- Scrollable chat window -->
        <div class="card-body p-4" style="height: 500px; overflow-y: auto; background-color: #f5f5f5;">

            <!-- Check if there are any messages to display -->
            {% if inbox_messages %}

                <!-- Loop through each message and display as chat bubble -->
                {% for m in inbox_messages %}
                <div class="mb-4">

                    <!-- Sender name above bubble -->
                    <small class="text-muted fw-bold">{{ m.sender }}</small>

                    <!-- Chat bubble -->
                    <div class="p-3 rounded-3 mt-1 shadow-sm"
                         style="background-color: white; max-width: 70%; border-left: 4px solid #0172B0;">

                        <!-- Message title/subject -->
                        <p class="fw-bold mb-1" style="color: #0172B0;">{{ m.title }}</p>

                        <!-- Full message content -->
                        <p class="mb-0" style="font-size: 15px;">{{ m.content }}</p>
                    </div>

                </div>
                {% endfor %}

            {% else %}

            <!-- Empty state when no messages exist -->
            <div class="text-center py-5">
                <p style="font-size: 48px;">📭</p>
                <h5 class="text-muted">No messages yet</h5>
                <p class="text-muted">Send a message to get started.</p>
            </div>

            {% endif %}

        </div>
    </div>

</div>

{% endblock %}
