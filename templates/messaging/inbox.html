{% extends "layout.html" %}

{% block content %}
<h1>Inbox</h1>

<!-- Link to create a new message -->
<a href="/messages/new/">New Message</a>

<!-- Loop through all messages -->
{% for m in messages %}
    <p><b>{{ m.subject }}</b> - {{ m.content }}</p>
{% empty %}
    <p>No messages</p>
{% endfor %}
{% endblock %}
