{% extends "layout.html" %}

{% block content %}

<style>
    .nav-bar{
        background-color: #0172B0;
    }

    .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 56px);
        background-color: #0172B0;
    }

    .login-box {
    background-color: white;
    padding: 60px 50px;
    border-radius: 8px;
    width: 420px;
    min-height: 520px;        
    display: flex;
    flex-direction: column;
    justify-content: center;  
}

    /* place holder for light grey text */
    ::placeholder{
        color: #aaaaaa;
        font-style: italic;
    }

    .error-message{
        background-color: #ffe0e0;
        color: #cc0000;
        border: 1px solid #cc0000;
        border-radius: 4px;
        padding: 8px 12px;
        margin-bottom: 12px;
        font-size: 14px;
        text-align: center;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
        display: block;
        width: 100%;
        margin-top: 5px;
        padding: 8px;
        border: 1px solid #cccccc;
        border-radius: 4px;
    }

    button[type="submit"] {
    display: block;
    width: 100%;
    padding: 10px;
    background-color: #0172B0;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

button[type="submit"]:hover {
    background-color: #005a8e;
}

.btn-link-style {
    display: block;
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    text-align: center;
    border-radius: 4px;
    font-size: 14px;
    text-decoration: none;
}

.btn-register {
    background-color: #0172B0;
    color: white;
}

.btn-register:hover {
    background-color: #005a8e;
    color: white;
}

.btn-admin {
    background-color: white;
    color: #0172B0;
    border: 2px solid #0172B0;
}

.btn-admin:hover {
    background-color: #f0f8ff;
}

.forgot-link {
    display: block;
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
    color: #0172B0;
}

</style>

<div class = "login-wrapper">
    <div class = "login-box">

        <h2>Login</h2>

        {% if error %}
            <div class = "error-message">
                ⚠️{{ error }}
            </div>
        {% endif %}
        <!--end of error message-->

        <form method="POST">

            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="username" placeholder= "e.g. John.smith">

            <br><br>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your Password">

            <br><br>

            <input type="checkbox" name="remember_me">
            <label>Remember Me</label>

            <br><br>

            <button type="submit">Login</button>

        </form>

        <br>
        <a href=<"{% url 'forgot_password' %}" class="forgot-link">Forgot Password?</a>
        <br>
        <a href="{% url 'register' %}" class="btn-link-style btn-register">Register</a>
        <a href="{% url 'admin_login' %}" class="btn-link-style btn-admin">Admin Login</a>

    </div>
</div>

{% block footer %}{% endblock %}

{% endblock %}
