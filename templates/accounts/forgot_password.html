{% extends "layout.html" %}

{% block content %}

<style>
    .forgot-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 60vh;
        background-color: #0172B0;
    }

    .forgot-box {
        background-color: white;
        padding: 40px;
        border-radius: 8px;
        width: 300px;
    }

    ::placeholder {
        color: #aaaaaa;
        font-style: italic;
    }

    .success-message {
        background-color: #e0ffe0;
        color: #007700;
        border: 1px solid #007700;
        border-radius: 4px;
        padding: 8px 12px;
        margin-bottom: 12px;
        font-size: 14px;
        text-align: center;
    }
</style>

<div class="forgot-wrapper">
    <div class="forgot-box">

        <h2>Forgot Password</h2>
        <p style="font-size: 14px; color: #555;">Enter your email and we'll send you a reset link.</p>

        <br>

        
        {% if success %}
            <div class="success-message">
                If that email exists, a reset link has been sent.
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Email</label>
            <input type="email" name="email" placeholder="e.g. john@email.com">

            <br><br>

            <button type="submit">Send Reset Link</button>

        </form>

        <br>
        <a href="{% url 'login' %}">Back to Login</a>

    </div>
</div>

{% block footer %}{% endblock %}

{% endblock %}
