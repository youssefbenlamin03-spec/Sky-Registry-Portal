{% extends "layout.html" %}

{% block content %}

<style>
    .admin-login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 60vh;
        background-color: #0172B0;
    }

    .admin-login-box {
        background-color: white;
        padding: 40px;
        border-radius: 8px;
        width: 300px;
    }

    ::placeholder {
        color: #aaaaaa;
        font-style: italic;
    }

    .error-message {
        background-color: #ffe0e0;
        color: #cc0000;
        border: 1px solid #cc0000;
        border-radius: 4px;
        padding: 8px 12px;
        margin-bottom: 12px;
        font-size: 14px;
        text-align: center;
    }
</style>

<div class="admin-login-wrapper">
    <div class="admin-login-box">

        <h2>🔒 Admin Login</h2>
        <p style="font-size: 14px; color: #555;">Restricted area. Admins only.</p>

        <br>

        {% if error %}
            <div class="error-message">
                ⚠️ {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="username" placeholder="e.g. admin">

            <br><br>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password">

            <br><br>

            <button type="submit">Admin Login</button>

        </form>

        <br>
        <a href="{% url 'login' %}">Back to Login</a>

    </div>
</div>

{% block footer %}{% endblock %}

{% endblock %}
