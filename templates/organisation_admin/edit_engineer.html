{% extends 'layout.html' %}

{% block content %}

<!-- Centre the card horizontally on the page using Bootstrap's grid system -->
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">

            <!-- Card header shows the name of the engineer being edited
                 eng.engineerName comes from the view which passes the
                 engineer object to the template as 'eng' -->
            <div class="card-header fw-bold">
                Edit Engineer — {{ eng.engineerName }}
            </div>

            <div class="card-body">
                
                <form method="post">

                    {% csrf_token %}

                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{% url 'org_admin_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
