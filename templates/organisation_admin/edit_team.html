{% extends 'layout.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">

            <!-- Shows which team is being edited -->
            <div class="card-header fw-bold">
                Edit Team — {{ team.teamName }}
            </div>

            <div class="card-body">

                <!-- Form submits via POST back to the same URL.
                     The view handles saving the updated data. -->

                <form method="post">

                     <!-- Django requires this token on every POST form
                         to protect against cross-site request forgery attacks -->

                    {% csrf_token %}

                    <!-- Loop through every field in the Django form object.
                         Django auto-generates the input fields based on the
                         model, so we don't need to write each field manually. -->

                    {% for field in form %}
                    <div class="mb-3">

                        <!-- The field label e.g. "Engineer Name", "Email" etc. -->

                        <label class="form-label fw-semibold">{{ field.label }}</label>

                        <!-- The actual input element (text box, dropdown etc.)
                         Django renders the correct input type automatically -->

                        {{ field }}
                        {% if field.errors %}

                         <!-- If the field has a validation error (e.g. left blank),
                             display the error message in red below the input -->

                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}

                        <!-- Action buttons at the bottom of the form:
                         Save Changes — submits the form to update the engineer
                         Cancel — goes back to the admin dashboard without saving -->

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{% url 'org_admin_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
